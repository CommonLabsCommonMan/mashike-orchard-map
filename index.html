<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>増毛オーチャードマップ | Mashike Orchard Map</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --green: #2e7d50;
  --green-dark: #1b5e34;
  --surface: #fff;
  --text: #1a1a1a;
  --muted: #666;
  --border: #ddd;
  --orchard: #2e7d50;
  --honey: #e8a000;
  --route: #1565c0;
  --parking: #555;
  --toilet: #6a1b9a;
  --scenic: #bf360c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;color:var(--text)}
body{display:flex;flex-direction:column}
#header{background:var(--green);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.2);z-index:1001}
#header h1{font-size:16px;font-weight:700;line-height:1.3}
#header h1 span{display:block;font-size:11px;font-weight:400;opacity:.85}
#lang-toggle{background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.4);color:#fff;padding:4px 12px;border-radius:20px;font-size:12px;cursor:pointer;font-family:inherit}
#filter-bar{background:var(--surface);padding:8px 12px;display:flex;gap:8px;overflow-x:auto;flex-shrink:0;border-bottom:1px solid var(--border);scrollbar-width:none}
#filter-bar::-webkit-scrollbar{display:none}
.chip{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:20px;border:1.5px solid;font-size:12px;white-space:nowrap;cursor:pointer;transition:all .15s;background:#fff;font-family:inherit}
.chip.active{color:#fff!important}
.chip[data-cat=all]{border-color:#333;color:#333}.chip[data-cat=all].active{background:#333}
.chip[data-cat=orchard]{border-color:var(--orchard);color:var(--orchard)}.chip[data-cat=orchard].active{background:var(--orchard)}
.chip[data-cat=honey]{border-color:var(--honey);color:var(--honey)}.chip[data-cat=honey].active{background:var(--honey)}
.chip[data-cat=route]{border-color:var(--route);color:var(--route)}.chip[data-cat=route].active{background:var(--route)}
.chip[data-cat=parking]{border-color:var(--parking);color:var(--parking)}.chip[data-cat=parking].active{background:var(--parking)}
.chip[data-cat=toilet]{border-color:var(--toilet);color:var(--toilet)}.chip[data-cat=toilet].active{background:var(--toilet)}
.chip[data-cat=scenic]{border-color:var(--scenic);color:var(--scenic)}.chip[data-cat=scenic].active{background:var(--scenic)}
#map{flex:1;min-height:0;width:100%;position:relative}
.maplibregl-ctrl-group{border-radius:8px!important}
#tilt-btn{position:absolute;bottom:80px;right:10px;z-index:500;background:#fff;border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);font-family:inherit;line-height:1.3;text-align:center}
#locate-btn{position:absolute;bottom:130px;right:10px;z-index:500;background:#fff;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;font-size:18px;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.15);display:flex;align-items:center;justify-content:center}
.emoji-marker{font-size:30px;line-height:1;cursor:pointer;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5));transition:transform .15s;user-select:none;display:block}
.emoji-marker:hover{transform:scale(1.25)}
#sheet-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:1100}
#bottom-sheet{position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-radius:18px 18px 0 0;padding:20px 20px 32px;max-height:70dvh;overflow-y:auto;z-index:1200;transform:translateY(100%);transition:transform .3s cubic-bezier(.16,1,.3,1);box-shadow:0 -4px 32px rgba(0,0,0,.18)}
#bottom-sheet.open{transform:translateY(0)}
#sheet-backdrop.open{display:block}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 16px}
#sheet-cat-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:12px;color:#fff;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
#sheet-name{font-size:20px;font-weight:700;margin-bottom:4px}
#sheet-name-sub{font-size:13px;color:var(--muted);margin-bottom:12px}
#sheet-image{width:100%;height:180px;object-fit:cover;border-radius:10px;margin-bottom:12px;display:none;background:#eee}
#sheet-desc{font-size:14px;line-height:1.65;color:#333;margin-bottom:8px}
#sheet-hours{font-size:13px;color:var(--muted);margin-bottom:4px}
#sheet-season{font-size:13px;color:var(--muted);margin-bottom:16px}
#sheet-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tag-chip{background:#f0f0f0;border-radius:12px;padding:3px 10px;font-size:12px;color:#555}
#nav-btn{display:block;width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;text-decoration:none;margin-bottom:10px}
#nav-btn:active{background:var(--green-dark)}
#close-btn{display:block;width:100%;padding:12px;background:#f5f5f5;color:#555;border:none;border-radius:12px;font-size:14px;font-family:inherit;cursor:pointer}
#loading{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px;font-size:14px;color:var(--muted)}
.spinner{width:36px;height:36px;border:3px solid #e0e0e0;border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <span id="loading-text">マップを読み込み中...</span>
</div>

<div id="header">
  <h1>増毛オーチャードマップ <span>Mashike Orchard Map</span></h1>
  <button id="lang-toggle" onclick="toggleLang()">EN</button>
</div>

<div id="filter-bar">
  <button class="chip active" data-cat="all"     onclick="filterCat('all')">🗺 すべて</button>
  <button class="chip"        data-cat="orchard" onclick="filterCat('orchard')">🍎 果樹園</button>
  <button class="chip"        data-cat="honey"   onclick="filterCat('honey')">🍯 養蜂園</button>
  <button class="chip"        data-cat="route"   onclick="filterCat('route')">🛤 回廊</button>
  <button class="chip"        data-cat="parking" onclick="filterCat('parking')">🅿 駐車場</button>
  <button class="chip"        data-cat="toilet"  onclick="filterCat('toilet')">🚻 トイレ</button>
  <button class="chip"        data-cat="scenic"  onclick="filterCat('scenic')">🏔 見どころ</button>
</div>

<div id="map">
  <button id="tilt-btn"   onclick="toggle3D()">🏔<br>3D</button>
  <button id="locate-btn" onclick="locateMe()" title="現在地">📍</button>
</div>

<div id="sheet-backdrop" onclick="closeSheet()"></div>
<div id="bottom-sheet">
  <div class="sheet-handle"></div>
  <span id="sheet-cat-badge"></span>
  <div id="sheet-name"></div>
  <div id="sheet-name-sub"></div>
  <img id="sheet-image" alt="" loading="lazy">
  <div id="sheet-desc"></div>
  <div id="sheet-hours"></div>
  <div id="sheet-season"></div>
  <div id="sheet-tags"></div>
  <a id="nav-btn" target="_blank" rel="noopener noreferrer">🗺 ここへナビ / Navigate Here</a>
  <button id="close-btn" onclick="closeSheet()">閉じる / Close</button>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
// =============================================
// EDIT THESE TWO VALUES
var GAS_URL      = 'https://script.google.com/macros/s/AKfycbyoK-Z6nF7RgtkQEA-kwJxSYH_6eplPJNyXArynC-sxaHu9Ze4IapzOLInha1_sXZntbg/exec';
var MAPTILER_KEY = 'zqRM3ipv02HyL0fLF6Kw'; // leave '' to use flat OSM tiles
// =============================================

var lang = 'ja', allData = [], activeCat = 'all', activeMarkers = [];
var map, is3D = false, mapReady = false;

// Crop name → emoji mapping (Japanese crop names from the CSV)
var CROP_EMOJI = {
  'サクランボ': '🍒',
  'リンゴ':     '🍎',
  '梨':         '🍐',
  'ブドウ':     '🍇',
  '桃':         '🍑',
  'プルーン':   '🟣',
  'プラム':     '💜',
  'イチゴ':     '🍓',
  'ブルーベリー':'🫐',
  'スイカ':     '🍉',
  'メロン':     '🍈',
  'ミカン':     '🍊',
  'レモン':     '🍋'
};

var COLORS = {
  orchard:'#2e7d50', honey:'#e8a000', route:'#1565c0',
  parking:'#555', toilet:'#6a1b9a', scenic:'#bf360c'
};
var LABELS = {
  ja:{ all:'すべて', orchard:'果樹園', honey:'養蜂園', route:'回廊', parking:'駐車場', toilet:'トイレ', scenic:'見どころ' },
  en:{ all:'All', orchard:'Orchard', honey:'Honey Farm', route:'Route', parking:'Parking', toilet:'Toilet', scenic:'Scenic' }
};
var ICONS = { all:'🗺', orchard:'🍎', honey:'🍯', route:'🛤', parking:'🅿', toilet:'🚻', scenic:'🏔' };

// Build multi-emoji marker string from crops column
function getCropEmojis(cropsStr) {
  if (!cropsStr) return '🌿';
  var seen = {};
  var result = '';
  cropsStr.split(',').forEach(function(c) {
    var crop = c.trim();
    if (CROP_EMOJI[crop] && !seen[crop]) {
      seen[crop] = true;
      result += CROP_EMOJI[crop];
    }
  });
  return result || '🌿';
}

function renderMarkers(data) {
  activeMarkers.forEach(function(m){ m.remove(); });
  activeMarkers = [];
  data.forEach(function(item) {
    var lat = parseFloat(item.lat), lng = parseFloat(item.lng);
    if (!lat || !lng || isNaN(lat) || isNaN(lng)) return;

    var emojiStr = (item.category === 'orchard' && item.crops)
      ? getCropEmojis(item.crops)
      : (ICONS[item.category] || '📍');

    var el = document.createElement('div');
    el.style.cssText = [
      'display:flex',
      'flex-wrap:wrap',
      'max-width:56px',
      'line-height:1.1',
      'font-size:20px',
      'cursor:pointer',
      'filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))',
      'transition:transform .15s',
      'user-select:none',
      'background:rgba(255,255,255,0.82)',
      'border-radius:10px',
      'padding:3px 4px',
      'box-shadow:0 1px 4px rgba(0,0,0,0.18)'
    ].join(';');
    el.textContent = emojiStr;
    el.title = item.name_ja || item.name_en || '';
    el.onmouseenter = function(){ el.style.transform='scale(1.2)'; };
    el.onmouseleave = function(){ el.style.transform='scale(1)'; };

    var marker = new maplibregl.Marker({ element:el, anchor:'bottom' })
      .setLngLat([lng, lat]).addTo(map);
    el.addEventListener('click', function(){ openSheet(item); });
    activeMarkers.push(marker);
  });
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.chip').forEach(function(c){ c.classList.toggle('active', c.dataset.cat === cat); });
  renderMarkers(cat === 'all' ? allData : allData.filter(function(d){ return d.category === cat; }));
}

function loadData() {
  if (!GAS_URL || GAS_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    document.getElementById('loading-text').textContent = '⚠ GAS_URL を設定してください';
    return;
  }
  window._cb = function(data) {
    allData = data;
    renderMarkers(data);
    document.getElementById('loading').style.display = 'none';
  };
  var s = document.createElement('script');
  s.src = GAS_URL + '?sheet=orchards&callback=_cb';
  s.onerror = function(){ document.getElementById('loading-text').textContent = 'データ読み込みエラー'; };
  document.head.appendChild(s);
}

function openSheet(item) {
  var cat = item.category || 'orchard';
  var badge = document.getElementById('sheet-cat-badge');
  badge.textContent = (LABELS[lang]||LABELS.ja)[cat] || cat;
  badge.style.background = COLORS[cat] || '#888';

  // Farm name
  document.getElementById('sheet-name').textContent     = item.name_ja || '';
  document.getElementById('sheet-name-sub').textContent = item.name_en || '';

  // Build card content
  var desc = document.getElementById('sheet-desc');
  var html = '';

  // Crops with emojis
  if (item.crops) {
    html += '<div style="margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'
          + (lang==='ja'?'作付け作物':'Crops') + '</div>';
    var cropRow = '';
    item.crops.split(',').forEach(function(c) {
      var crop = c.trim();
      var em = CROP_EMOJI[crop] || '🌿';
      cropRow += '<span style="display:inline-flex;align-items:center;gap:3px;background:#f3f9f5;border:1px solid #c8e6c9;border-radius:20px;padding:3px 9px;font-size:13px;margin:3px 3px 0 0">'
               + em + ' ' + crop + '</span>';
    });
    html += cropRow + '</div>';
  }

  // Varieties in colored font
  if (item.varieties) {
    html += '<div style="margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'
          + (lang==='ja'?'品種':'Varieties') + '</div>';
    var varRow = '';
    item.varieties.split(',').forEach(function(v, i) {
      // Rotate through 4 accent colors
      var palette = ['#1565c0','#6a1b9a','#bf360c','#2e7d50'];
      var col = palette[i % palette.length];
      varRow += '<span style="font-size:12px;color:' + col + ';font-weight:600;margin-right:6px;white-space:nowrap">'
              + v.trim() + '</span>';
    });
    html += '<div style="line-height:2">' + varRow + '</div></div>';
  }

  // Picking indicator
  if (item.picking) {
    var canPick = item.picking !== 'なし' && item.picking.trim() !== '';
    var pickColor = canPick ? '#2e7d50' : '#999';
    var pickIcon  = canPick ? '✅' : '❌';
    var pickLabel = canPick
      ? (lang==='ja' ? '収穫体験できます: ' : 'Picking available: ') + item.picking
      : (lang==='ja' ? '収穫体験なし' : 'No picking');
    html += '<div style="display:flex;align-items:center;gap:6px;background:' + (canPick?'#e8f5e9':'#f5f5f5') + ';border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:13px;color:' + pickColor + ';font-weight:700">'
          + pickIcon + ' ' + pickLabel + '</div>';
  }

  // Processed products
  if (item.products && item.products.trim()) {
    html += '<div style="margin-bottom:10px">';
    html += '<div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">'
          + (lang==='ja'?'加工品・販売品':'Products') + '</div>';
    var prodRow = '';
    item.products.split(',').forEach(function(p) {
      prodRow += '<span style="display:inline-flex;align-items:center;gap:3px;background:#fff8e1;border:1px solid #ffe082;border-radius:20px;padding:3px 9px;font-size:13px;margin:3px 3px 0 0">'
               + '🧃 ' + p.trim() + '</span>';
    });
    html += prodRow + '</div>';
  }

  // Address and phone
  if (item.address) {
    html += '<div style="font-size:12px;color:#666;margin-bottom:4px">📍 ' + item.address + '</div>';
  }
  if (item.phone) {
    html += '<div style="font-size:12px;color:#666;margin-bottom:4px">📞 <a href="tel:' + item.phone.replace(/[^0-9\-]/g,'') + '" style="color:#1565c0">' + item.phone + '</a></div>';
  }
  if (item.season) {
    html += '<div style="font-size:12px;color:#666;margin-bottom:4px">📅 ' + item.season + '</div>';
  }

  desc.innerHTML = html;

  // Hide old separate fields (now embedded in desc)
  document.getElementById('sheet-hours').textContent  = '';
  document.getElementById('sheet-season').textContent = '';
  document.getElementById('sheet-tags').innerHTML     = '';

  // Image
  var img = document.getElementById('sheet-image');
  if (item.image_url) { img.src = item.image_url; img.style.display='block'; }
  else { img.style.display='none'; }

  // Navigate button
  var navBtn = document.getElementById('nav-btn');
  navBtn.href = item.google_maps_url ||
    ('https://www.google.com/maps/dir/?api=1&destination=' + item.lat + ',' + item.lng + '&travelmode=driving&dir_action=navigate');
  navBtn.style.display = item.lat ? 'block' : 'none';

  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('open');
  map.flyTo({ center:[parseFloat(item.lng), parseFloat(item.lat)+0.003], duration:600 });
}

function closeSheet() {
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
}

function toggleLang() {
  lang = lang === 'ja' ? 'en' : 'ja';
  document.getElementById('lang-toggle').textContent = lang === 'ja' ? 'EN' : '日本語';
  document.querySelectorAll('.chip[data-cat]').forEach(function(c) {
    var cat = c.dataset.cat;
    c.textContent = (ICONS[cat]||'') + ' ' + (LABELS[lang][cat]||cat);
  });
  renderMarkers(activeCat === 'all' ? allData : allData.filter(function(d){ return d.category === activeCat; }));
}

function locateMe() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(function(pos) {
    map.flyTo({ center:[pos.coords.longitude, pos.coords.latitude], zoom:15, duration:800 });
    var el = document.createElement('div');
    el.style.cssText = 'width:14px;height:14px;background:#1565c0;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(21,101,192,.6)';
    new maplibregl.Marker({ element:el }).setLngLat([pos.coords.longitude, pos.coords.latitude]).addTo(map);
  });
}
</script>
</body>
</html>
